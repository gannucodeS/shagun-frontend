<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SHAGUN Wedding Planners</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="https://i.postimg.cc/v8khPQmR/f3no-BG.png">
</head>
<body>

  <div id="progress-bar"></div>

  <!-- LOADER -->
  <div id="loader">
    <div class="loader-mandala"></div>
    <div class="loader-logo">Shagun</div>
    <div class="loader-subtitle">Wedding Planners · Ajmer</div>
  </div>

  <!-- AUTH SECTION -->
  <section class="auth-section">
    <div class="auth-bg-pattern"></div>

    <!-- Back link -->
    <a href="index.html" style="position:absolute;top:2rem;left:2rem;font-family:var(--font-ui);font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(245,230,200,0.4);transition:var(--transition);z-index:10;"
       onmouseover="this.style.color='var(--gold-light)'" onmouseout="this.style.color='rgba(245,230,200,0.4)'">
      ← Back to Home
    </a>

    <!-- Dark toggle -->
    <button id="dark-toggle" style="position:absolute;top:2rem;right:2rem;z-index:10;">🌙</button>

    <div class="auth-box">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo">Shagun</div>
        <div class="tagline">Wedding Planners · Ajmer</div>
        <div style="width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1rem auto 0;"></div>
      </div>

      <!-- Role Switch: Client / Admin -->
      <div class="role-switch">
        <div class="role-btn active" data-role="client">Client</div>
        <div class="role-btn" data-role="admin">Event Manager</div>
      </div>

      <!-- Tabs: Login / Signup -->
      <div class="auth-tabs">
        <div class="auth-tab active" data-tab="login">Sign In</div>
        <div class="auth-tab" data-tab="signup">Create Account</div>
      </div>

      <!-- LOGIN PANEL -->
      <div class="auth-panel active" id="login">
        <form class="auth-form" id="login-form">
          <div class="form-group">
            <label class="form-label">Email Address *</label>
            <input type="email" class="form-input" name="email" required placeholder="your@email.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label class="form-label">Password *</label>
            <input type="password" class="form-input" name="password" required placeholder="••••••••" autocomplete="current-password" />
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
            <label style="display:flex;align-items:center;gap:0.5rem;font-family:var(--font-ui);font-size:0.7rem;color:rgba(245,230,200,0.4);cursor:pointer;">
              <input type="checkbox" style="accent-color:var(--gold);" /> Remember me
            </label>
            <a href="#" style="font-family:var(--font-ui);font-size:0.7rem;color:var(--gold);letter-spacing:0.05em;">Forgot password?</a>
          </div>
          <button type="submit" class="btn-primary">Sign In</button>
          <div class="auth-divider">— or continue with —</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <button type="button" style="border:1px solid rgba(200,150,42,0.2);padding:0.7rem;border-radius:2px;font-family:var(--font-ui);font-size:0.7rem;color:rgba(245,230,200,0.5);cursor:pointer;transition:var(--transition);" onclick="showToast('Google login coming soon!','info')">
              🌐 Google
            </button>
            <button type="button" style="border:1px solid rgba(200,150,42,0.2);padding:0.7rem;border-radius:2px;font-family:var(--font-ui);font-size:0.7rem;color:rgba(245,230,200,0.5);cursor:pointer;transition:var(--transition);" onclick="showToast('Phone login coming soon!','info')">
              📱 Phone OTP
            </button>
          </div>
        </form>
      </div>

      <!-- SIGNUP PANEL -->
      <div class="auth-panel" id="signup">
        <form class="auth-form" id="signup-form">
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input type="text" class="form-input" name="name" required placeholder="Priya Sharma" autocomplete="name" />
          </div>
          <div class="form-group">
            <label class="form-label">Email Address *</label>
            <input type="email" class="form-input" name="email" required placeholder="priya@email.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number *</label>
            <input type="tel" class="form-input" name="phone" required placeholder="+91 98290 00000" />
          </div>
          <div class="form-group">
            <label class="form-label">Password *</label>
            <input type="password" class="form-input" name="password" required placeholder="Min. 8 characters" autocomplete="new-password" />
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password *</label>
            <input type="password" class="form-input" name="confirmPassword" required placeholder="Re-enter password" autocomplete="new-password" />
          </div>
          <div style="margin-bottom:1.5rem;">
            <label style="display:flex;align-items:flex-start;gap:0.5rem;font-family:var(--font-body);font-size:0.85rem;color:rgba(245,230,200,0.4);cursor:pointer;font-style:italic;">
              <input type="checkbox" style="accent-color:var(--gold);margin-top:3px;" required />
              I agree to the <a href="#" style="color:var(--gold);margin-left:0.25rem;">Terms of Service</a> &amp; <a href="#" style="color:var(--gold);margin-left:0.25rem;">Privacy Policy</a>
            </label>
          </div>
          <button type="submit" class="btn-primary">Create Account</button>
        </form>
      </div>

      <!-- Footer note -->
      <p style="font-family:var(--font-body);font-size:0.85rem;color:rgba(245,230,200,0.25);text-align:center;margin-top:2rem;font-style:italic;">
        © 2024 Shagun Wedding Planners · Ajmer, Rajasthan
      </p>

    </div><!-- /auth-box -->
  </section>

  <script src="script.js"></script>
</body>
</html>
